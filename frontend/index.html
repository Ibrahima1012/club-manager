<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Gestion de club — Factures, Diplômes, Reçus">
  <meta name="theme-color" content="#6366f1">
  <title>Club Manager</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: {
        primary: { 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' }
      }}}
    }
  </script>
  <style>
    :root { --primary: #6366f1; }
    [data-theme="dark"] { --bg: #0f172a; --surface: #1e293b; }
    .slide-in { animation: slideIn .25s ease; }
    @keyframes slideIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    #app { min-height: 100vh; }
    .demo-badge { background: linear-gradient(135deg, #f59e0b, #ef4444); }
  </style>
</head>
<body class="bg-gray-50 dark:bg-slate-900 text-gray-900 dark:text-white transition-colors">
  <div id="app">
    <!-- Auth Screen -->
    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-4">
      <div class="w-full max-w-md bg-white dark:bg-slate-800 rounded-2xl shadow-xl p-8">
        <div class="text-center mb-8">
          <div class="w-16 h-16 bg-indigo-500 rounded-2xl mx-auto mb-4 flex items-center justify-center">
            <span class="text-white text-2xl">⚡</span>
          </div>
          <h1 class="text-2xl font-bold">Club Manager</h1>
          <p class="text-gray-500 text-sm mt-1">Gérez votre club professionellement</p>
        </div>
        <div id="auth-form"></div>
      </div>
    </div>

    <!-- Paywall Screen -->
    <div id="paywall-screen" class="hidden min-h-screen flex items-center justify-center p-4">
      <div class="w-full max-w-lg bg-white dark:bg-slate-800 rounded-2xl shadow-xl p-8 text-center">
        <div class="demo-badge text-white text-xs font-bold px-3 py-1 rounded-full inline-block mb-4">MODE DÉMO</div>
        <h2 class="text-2xl font-bold mb-2">Débloquez Club Manager</h2>
        <p class="text-gray-500 mb-8">Accès complet à toutes les fonctionnalités</p>
        <div class="grid grid-cols-2 gap-4 mb-8">
          <div class="border-2 border-indigo-500 rounded-xl p-4 cursor-pointer hover:bg-indigo-50 dark:hover:bg-indigo-900/20" onclick="selectPlan('monthly')">
            <div class="font-bold text-lg">5 000 XOF</div>
            <div class="text-sm text-gray-500">/mois</div>
            <div class="text-xs text-indigo-600 mt-1">Mensuel</div>
          </div>
          <div class="border-2 border-purple-500 rounded-xl p-4 cursor-pointer hover:bg-purple-50 dark:hover:bg-purple-900/20 relative" onclick="selectPlan('yearly')">
            <div class="absolute -top-2 left-1/2 -translate-x-1/2 bg-purple-500 text-white text-xs px-2 py-0.5 rounded">-25%</div>
            <div class="font-bold text-lg">45 000 XOF</div>
            <div class="text-sm text-gray-500">/an</div>
            <div class="text-xs text-purple-600 mt-1">Annuel</div>
          </div>
        </div>
        <button id="pay-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition" onclick="initPayment()">
          💳 Payer et activer
        </button>
        <button class="mt-3 w-full text-sm text-gray-400 hover:text-gray-600" onclick="enterDemoMode()">
          Continuer en mode démo (limité)
        </button>
      </div>
    </div>

    <!-- Main App -->
    <div id="main-app" class="hidden flex h-screen overflow-hidden">
      <!-- Sidebar -->
      <aside id="sidebar" class="w-64 bg-white dark:bg-slate-800 border-r border-gray-200 dark:border-slate-700 flex flex-col shadow-sm">
        <div class="p-4 border-b border-gray-200 dark:border-slate-700">
          <div class="flex items-center gap-3">
            <img id="sidebar-logo" src="/icons/icon-192.png" class="w-8 h-8 rounded-lg" alt="logo">
            <div>
              <div id="sidebar-club-name" class="font-bold text-sm">Club Manager</div>
              <div id="demo-indicator" class="hidden text-xs text-orange-500 font-medium">Mode Démo</div>
            </div>
          </div>
        </div>
        <nav class="flex-1 p-4 space-y-1">
          <a href="#" class="nav-item active flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-indigo-600 bg-indigo-50 dark:bg-indigo-900/30" data-page="dashboard">
            📊 <span>Dashboard</span>
          </a>
          <a href="#" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-slate-700" data-page="invoices">
            🧾 <span>Factures</span>
          </a>
          <a href="#" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-slate-700" data-page="receipts">
            💵 <span>Reçus</span>
          </a>
          <a href="#" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-slate-700" data-page="diplomas">
            🎓 <span>Diplômes</span>
          </a>
          <a href="#" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-slate-700" data-page="expenses">
            💸 <span>Dépenses</span>
          </a>
          <a href="#" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-slate-700" data-page="settings">
            ⚙️ <span>Paramètres</span>
          </a>
        </nav>
        <div class="p-4 border-t border-gray-200 dark:border-slate-700">
          <button onclick="toggleDark()" class="flex items-center gap-2 text-xs text-gray-500 hover:text-gray-700 w-full px-2 py-1.5 rounded">
            🌙 <span>Mode sombre</span>
          </button>
          <button onclick="logout()" class="flex items-center gap-2 text-xs text-red-500 hover:text-red-700 w-full px-2 py-1.5 rounded mt-1">
            🚪 <span>Déconnexion</span>
          </button>
        </div>
      </aside>

      <!-- Content -->
      <main class="flex-1 overflow-auto bg-gray-50 dark:bg-slate-900">
        <div id="page-content" class="p-6 slide-in"></div>
      </main>
    </div>
  </div>

  <script src="/js/db.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/payment.js"></script>
  <script src="/js/pdf.js"></script>
  <script src="/js/share.js"></script>
  <script src="/js/modules/settings.js"></script>
  <script src="/js/modules/invoices.js"></script>
  <script src="/js/modules/receipts.js"></script>
  <script src="/js/modules/diplomas.js"></script>
  <script src="/js/modules/expenses.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
